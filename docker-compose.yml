version: '3.8'

services:
  # PostgreSQL Database for content, events, and learner models
  postgres:
    image: postgres:16-alpine
    container_name: lumo-postgres
    environment:
      POSTGRES_USER: lumo
      POSTGRES_PASSWORD: lumo_dev_password
      POSTGRES_DB: lumo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for storing content assets (images, videos, etc.)
  minio:
    image: minio/minio:latest
    container_name: lumo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lumo
      MINIO_ROOT_PASSWORD: lumo_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis for task queue (Celery)
  redis:
    image: redis:7-alpine
    container_name: lumo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:

